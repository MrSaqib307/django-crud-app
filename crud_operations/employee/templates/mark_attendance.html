<!DOCTYPE html>
<html lang="en">
<head>
    <title>Mark Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">👔 Employee Manager</a>
        <div class="d-flex">
            <a href="/" class="btn btn-outline-light me-2">Home</a>
            <a href="/dashboard/" class="btn btn-outline-light me-2">Dashboard</a>
            <a href="/departments/" class="btn btn-outline-light me-2">Departments</a>
            <a href="/attendance/" class="btn btn-outline-light me-2">Attendance</a>
            <a href="{% url 'create' %}" class="btn btn-light me-2">Add Employee</a>
            <a href="/logout/" class="btn btn-outline-light">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow" style="max-width: 500px; margin: auto;">
        <div class="card-header bg-success text-white">
            <h4>Mark Attendance</h4>
        </div>
        <div class="card-body">
            <form action="/attendance/mark/" method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Employee</label>
                    <select name="employee" class="form-select" required>
                        <option value="">Select Employee</option>
                        {% for emp in employees %}
                        <option value="{{ emp.id }}">{{ emp.emp_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Date</label>
                    <input type="date" name="date" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select" required>
                        <option value="Present">Present</option>
                        <option value="Absent">Absent</option>
                        <option value="Leave">Leave</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-success w-100">Mark Attendance</button>
            </form>
        </div>
    </div>
    <div class="text-center mt-3">
        <a href="/attendance/" class="btn btn-secondary">Back to Attendance</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
