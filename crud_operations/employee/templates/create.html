<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">👔 Employee Manager</a>
        <div class="d-flex">
            <a href="/" class="btn btn-outline-light me-2">Home</a>
            <a href="/dashboard/" class="btn btn-outline-light me-2">Dashboard</a>
            <a href="{% url 'create' %}" class="btn btn-light me-2">Add Employee</a>
            <a href="/logout/" class="btn btn-outline-light">Logout</a>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <div class="card shadow" style="max-width: 500px; margin: auto;">
        <div class="card-header bg-success text-white">
            <h4>Add Employee</h4>
        </div>
        <div class="card-body">
            <form action="{% url 'create_emp' %}" method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Employee ID</label>
                    <input type="number" name="emp_id" class="form-control" placeholder="Enter ID" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Employee Name</label>
                    <input type="text" name="emp_name" class="form-control" placeholder="Enter Name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Department</label>
                    <input type="text" name="emp_dept" class="form-control" placeholder="Enter Department" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Salary</label>
                    <input type="number" name="emp_salary" class="form-control" placeholder="Enter Salary" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="emp_email" class="form-control" placeholder="Enter Email">
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" name="emp_phone" class="form-control" placeholder="Enter Phone">
                </div>
                <button type="submit" class="btn btn-success w-100">Add Employee</button>
            </form>
        </div>
    </div>
    <div class="text-center mt-3">
        <a href="/" class="btn btn-secondary">Back to Home</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
