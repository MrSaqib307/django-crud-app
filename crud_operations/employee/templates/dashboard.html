<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">👔 Employee Manager</a>
        <div class="d-flex">
            <a href="/" class="btn btn-outline-light me-2">Home</a>
            <a href="/dashboard/" class="btn btn-outline-light me-2">Dashboard</a>
            <a href="{% url 'create' %}" class="btn btn-light me-2">Add Employee</a>
            <a href="/logout/" class="btn btn-outline-light">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center mb-4">Dashboard</h2>
    <div class="row justify-content-center mb-5">
        <div class="col-md-4">
            <div class="card text-white bg-success shadow mb-4">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Employees</h5>
                    <h1>{{ total_employees }}</h1>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-primary shadow mb-4">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Departments</h5>
                    <h1>{{ total_departments }}</h1>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-warning shadow mb-4">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Salary</h5>
                    <h1>{{ total_salary }}</h1>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card shadow mb-4">
                <div class="card-header bg-success text-white">
                    <h5>Employees by Department</h5>
                </div>
                <div class="card-body">
                    <canvas id="deptChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow mb-4">
                <div class="card-header bg-primary text-white">
                    <h5>Salary by Department</h5>
                </div>
                <div class="card-body">
                    <canvas id="salaryChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const deptLabels = {{ dept_labels|safe }};
    const deptCounts = {{ dept_counts|safe }};
    const salaryCounts = {{ salary_data|safe }};

    new Chart(document.getElementById('deptChart'), {
        type: 'pie',
        data: {
            labels: deptLabels,
            datasets: [{
                data: deptCounts,
                backgroundColor: ['#28a745', '#007bff', '#ffc107', '#dc3545', '#17a2b8', '#6f42c1'],
            }]
        }
    });

    new Chart(document.getElementById('salaryChart'), {
        type: 'bar',
        data: {
            labels: deptLabels,
            datasets: [{
                label: 'Total Salary',
                data: salaryCounts,
                backgroundColor: '#007bff',
            }]
        },
        options: {
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
</script>
</body>
</html>
