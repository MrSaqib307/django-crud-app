<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">👔 Employee Manager</a>
        <div class="d-flex">
            <a href="/" class="btn btn-outline-light me-2">Home</a>
            <a href="/dashboard/" class="btn btn-outline-light me-2">Dashboard</a>
            <a href="{% url 'create' %}" class="btn btn-light">Add Employee</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center mb-4">Dashboard</h2>
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card text-white bg-success shadow mb-4">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Employees</h5>
                    <h1>{{ total_employees }}</h1>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-primary shadow mb-4">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Departments</h5>
                    <h1>{{ total_departments }}</h1>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-warning shadow mb-4">
                <div class="card-body text-center">
                    <h5 class="card-title">Total Salary</h5>
                    <h1>{{ total_salary }}</h1>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
