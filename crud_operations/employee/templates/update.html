<!DOCTYPE html>
<html lang="en">
<head>
    <title>Update Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">👔 Employee Manager</a>
        <div class="d-flex">
    <a href="/" class="btn btn-outline-light me-2">Home</a>
    <a href="/dashboard/" class="btn btn-outline-light me-2">Dashboard</a>
    <a href="{% url 'create' %}" class="btn btn-light">Add Employee</a>
</div>
    </div>
</nav>
    <div class="container mt-5">
        <div class="card shadow" style="max-width: 500px; margin: auto;">
            <div class="card-header bg-warning">
                <h4>Update Employee</h4>
            </div>
            <div class="card-body">
                <form action="{% url 'update_emp' employee.id %}" method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Employee ID</label>
                        <input type="number" name="emp_id" class="form-control" value="{{ employee.emp_id }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Employee Name</label>
                        <input type="text" name="emp_name" class="form-control" value="{{ employee.emp_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Department</label>
                        <input type="text" name="emp_dept" class="form-control" value="{{ employee.emp_dept }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Salary</label>
                        <input type="number" name="emp_salary" class="form-control" value="{{ employee.emp_salary }}" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Update Employee</button>
                </form>
            </div>
        </div>
        <div class="text-center mt-3">
            <a href="/" class="btn btn-secondary">Back to Home</a>
        </div>
    </div>
</body>
</html>
